<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Insurance Premium Calculator Pro</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.card{
background:#fff;
max-width:500px;
width:100%;
padding:25px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#1e3a8a;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#1e3a8a;
color:white;
cursor:pointer;
font-size:16px;
}

.result{
display:none;
margin-top:20px;
padding:15px;
background:#eef6ff;
border-radius:10px;
}

.amount{
font-size:28px;
font-weight:bold;
color:green;
}

.small{
font-size:14px;
color:#555;
}

.risk{
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>Insurance Premium Calculator Pro</h1>

<label>Age</label>
<input type="number" id="age">

<label>Sum Insured (₹)</label>
<input type="number" id="sum">

<label>Family Members</label>
<select id="family">
<option value="1">1 Member</option>
<option value="1.2">2 Members</option>
<option value="1.4">3-4 Members</option>
<option value="1.6">5+ Members</option>
</select>

<label>City Zone</label>
<select id="zone">
<option value="1.2">Zone A (Metro)</option>
<option value="1">Zone B</option>
<option value="0.9">Zone C</option>
</select>

<label>Plan Type</label>
<select id="plan">
<option value="1">Individual</option>
<option value="1.15">Family Floater</option>
<option value="1.25">Premium</option>
</select>

<label>Smoker Status</label>
<select id="smoker">
<option value="1">Non-Smoker</option>
<option value="1.25">Smoker</option>
</select>

<button onclick="calculatePremium()">
Calculate Premium
</button>

<div class="result" id="result">

<div class="amount" id="premium"></div>

<div class="small" id="monthly"></div>

<div class="small" id="gst"></div>

<div class="risk" id="risk"></div>

<button onclick="shareWhatsapp()">
Share on WhatsApp
</button>

</div>

</div>

<script>

function calculatePremium(){

let age=parseInt(document.getElementById('age').value);
let sum=parseFloat(document.getElementById('sum').value);

if(!age || !sum){
alert("Please fill all fields");
return;
}

let family=parseFloat(document.getElementById('family').value);
let zone=parseFloat(document.getElementById('zone').value);
let plan=parseFloat(document.getElementById('plan').value);
let smoker=parseFloat(document.getElementById('smoker').value);

let base=(sum*0.03)+(age*100);

let premium=
base*
family*
zone*
plan*
smoker;

let gst=premium*0.18;

let finalPremium=premium+gst;

document.getElementById('premium').innerHTML=
"₹"+Math.round(finalPremium).toLocaleString('en-IN');

document.getElementById('monthly').innerHTML=
"Monthly Premium: ₹"+
Math.round(finalPremium/12).toLocaleString('en-IN');

document.getElementById('gst').innerHTML=
"Including GST: ₹"+
Math.round(gst).toLocaleString('en-IN');

let risk="Moderate Risk";

if(age<35 && smoker===1)
risk="Low Risk";

if(age>55 || smoker>1)
risk="High Risk";

document.getElementById('risk').innerHTML=
"Risk Profile: "+risk;

document.getElementById('result').style.display='block';
}

function shareWhatsapp(){

let quote=
document.getElementById('premium').innerText;

let text=
"My Insurance Premium Estimate is "+quote;

window.open(
"https://wa.me/?text="+
encodeURIComponent(text)
);

}

</script>

</body>
</html>
