<!DOCTYPE html>
<html>
<head>
<title>Insurance Premium Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
width:400px;
}

h1{
text-align:center;
color:#1e3a8a;
}

label{
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#1e3a8a;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#result{
margin-top:20px;
text-align:center;
font-size:22px;
font-weight:bold;
color:green;
}
</style>
</head>

<body>

<div class="container">

<h1>Insurance Premium Calculator</h1>

<label>Age</label>
<input type="number" id="age" placeholder="Enter Age">

<label>Sum Insured (₹)</label>
<input type="number" id="suminsured" placeholder="Enter Coverage Amount">

<button onclick="calculatePremium()">
Calculate Premium
</button>

<div id="result"></div>

</div>

<script>
function calculatePremium(){

let age=parseInt(document.getElementById("age").value);
let sum=parseInt(document.getElementById("suminsured").value);

if(!age || !sum){
document.getElementById("result").innerHTML=
"Please fill all fields";
return;
}

let premium=(sum*0.03)+(age*100);

document.getElementById("result").innerHTML=
"Estimated Premium: ₹"+premium.toFixed(0);

}
</script>

</body>
</html>
